<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAF Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f8fafc;
    }
    header p {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e2130;
      border: 1px solid #2d3348;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 680px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus {
      border-color: #6366f1;
    }
    .input-row input::placeholder { color: #475569; }

    button#analyzeBtn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    button#analyzeBtn:hover:not(:disabled) { background: #4f46e5; }
    button#analyzeBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    #status {
      margin-top: 16px;
      font-size: 0.875rem;
      color: #64748b;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { margin-top: 28px; display: none; }

    /* Verdict badge */
    .verdict {
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .verdict.high   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.35); }
    .verdict.medium { background: rgba(234,179,8,0.12);  border: 1px solid rgba(234,179,8,0.3); }
    .verdict.low    { background: rgba(34,197,94,0.12);  border: 1px solid rgba(34,197,94,0.3); }

    .verdict-icon { font-size: 1.6rem; }
    .verdict-text h2 { font-size: 1.1rem; font-weight: 700; }
    .verdict-text p  { font-size: 0.82rem; margin-top: 3px; opacity: 0.75; }

    .verdict.high   .verdict-text h2 { color: #f87171; }
    .verdict.medium .verdict-text h2 { color: #fbbf24; }
    .verdict.low    .verdict-text h2 { color: #4ade80; }

    /* Score bar */
    .score-bar-wrap {
      margin-bottom: 22px;
    }
    .score-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .score-bar-bg {
      height: 8px;
      background: #2d3348;
      border-radius: 999px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .score-bar-fill.high   { background: linear-gradient(90deg, #ef4444, #f97316); }
    .score-bar-fill.medium { background: linear-gradient(90deg, #eab308, #f97316); }
    .score-bar-fill.low    { background: linear-gradient(90deg, #22c55e, #10b981); }

    /* Detection grid */
    .detections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }
    .det-item {
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .det-icon { font-size: 1.2rem; }
    .det-info .det-name  { font-size: 0.82rem; color: #94a3b8; }
    .det-info .det-value { font-size: 0.95rem; font-weight: 600; margin-top: 2px; }
    .det-value.yes { color: #f87171; }
    .det-value.no  { color: #4ade80; }
    .det-value.suspected { color: #fbbf24; }
    .det-value.unknown   { color: #94a3b8; }

    /* Reasons */
    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 10px;
    }
    .reasons-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 22px;
    }
    .reasons-list li {
      background: #0f1117;
      border-left: 3px solid #6366f1;
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      font-size: 0.875rem;
      color: #cbd5e1;
      line-height: 1.4;
    }

    /* Raw signals */
    details {
      background: #0f1117;
      border: 1px solid #2d3348;
      border-radius: 8px;
      overflow: hidden;
    }
    details summary {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.875rem;
      color: #94a3b8;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: '▶';
      font-size: 0.65rem;
      transition: transform 0.2s;
      color: #475569;
    }
    details[open] summary::before { transform: rotate(90deg); }
    details pre {
      padding: 14px 16px;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #94a3b8;
      overflow-x: auto;
      border-top: 1px solid #2d3348;
    }

    /* Meta info */
    .meta {
      margin-top: 14px;
      font-size: 0.75rem;
      color: #475569;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 14px 16px;
      color: #f87171;
      font-size: 0.875rem;
    }

    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .detections { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>WAF Detector</h1>
    <p>Analyze any website for Cloudflare, WAF, bot detection, and geo filtering</p>
  </header>

  <div class="card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="example.com or https://example.com" autocomplete="off" spellcheck="false" />
      <button id="analyzeBtn">Analyze</button>
    </div>
    <div id="status"></div>
    <div id="results"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
